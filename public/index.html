<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- headタグの中にはメタデータ等を記載する -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- bodyタグの中には実際に表示するものなどを書く -->
    <h1>しりとり</h1>
    <!-- 現在の単語を表示する場所 -->
    <div class="game-area">
        <div id="historyContainer"></div>

        <div id="currentCircle">り</div>
    </div>

    <p id="turnIndicator">自分のターン</p>
    <!-- 次の文字を入力するフォーム -->
    <input id="nextWordInput" type="text" />
    <button id="nextWordSendButton">送信</button>
    <!-- JavaScriptを実行 -->

    <script>
        //WebSocketサーバーに接続する
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${window.location.host}/shiritori-ws`);
        const paragraph = document.querySelector("#previousWord");
        const nextWordInput = document.querySelector("#nextWordInput");

        //サーバーからメッセージ（誰かが送信した単語）が届いたときの処理
        // サーバーからメッセージ（JSON）が届いたときの処理
        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);

            const historyContainer = document.querySelector("#historyContainer");
            const currentCircle = document.querySelector("#currentCircle");
            const turnIndicator = document.querySelector("#turnIndicator");
            const sendButton = document.querySelector("#nextWordSendButton");

            // 🔴 1. 待機中の通知が来た場合
            if (data.type === "waiting") {
                turnIndicator.textContent = data.message;
                sendButton.disabled = true;     // ボタンをロック
                nextWordInput.disabled = true;  // 入力欄をロック
            }

            //ゲーム開始、または通常の単語更新の場合
            else if (data.type === "game_start" || data.type === "success") {
                // 過去5件の履歴を表示
                historyContainer.innerHTML = data.recentWords
                    .map(word => `<span class="history-word">${word}</span>`)
                    .join('<span class="arrow">➔</span>');

                // 最新の1文字を丸の中に表示
                let lastChar = data.word.slice(-1);
                if (lastChar === "ー" && data.word.length > 1) {
                    lastChar = data.word.slice(-2, -1);
                }
                currentCircle.textContent = lastChar;
                nextWordInput.value = "";

                // ランダムに選ばれた手番に応じて画面を切り替える
                if (data.isYourTurn) {
                    turnIndicator.textContent = "自分のターン";
                    sendButton.disabled = false;
                    nextWordInput.disabled = false;
                } else {
                    turnIndicator.textContent = "相手のターン（考え中…）";
                    sendButton.disabled = true;
                    nextWordInput.disabled = true;
                }
            }

            //ゲームオーバーの場合
            else if (data.type === "gameover") {
                const msg = encodeURIComponent(data.errorMessage);
                window.location.href = `end.html?msg=${msg}`;
            }
        };

        //送信ボタンの押下時に実行
        document.querySelector("#nextWordSendButton").onclick = () => {
            const nextWordInputText = nextWordInput.value.trim(); // 前後の余計な空白を消す

            //ひらがな・カタカナ・長音記号「だけ」の正規表現
            const regex = /^[ぁ-んァ-ヶー]+$/;

            // もし入力が空、または正規表現にマッチしなかったら弾く
            if (!nextWordInputText) return;

            if (!regex.test(nextWordInputText)) {
                alert("ひらがな、またはカタカナだけで入力してください！(スペースや記号は使えません)");
                return; // ここで処理を終了して、サーバーには送らない
            }

            // 問題なければWebSocketで送信
            socket.send(nextWordInputText);
        };

        // 最初にページを開いたときに最新の単語を取得する処理
        window.onload = async (event) => {
            // GET /shiritoriを実行
            const response = await fetch("/shiritori", { method: "GET" });
            if (response.ok) {
                //JSONとして受け取る
                const data = await response.json();

                const historyContainer = document.querySelector("#historyContainer");
                const currentCircle = document.querySelector("#currentCircle");

                // 過去5件の履歴を表示
                historyContainer.innerHTML = data.recentWords
                    .map(word => `<span class="history-word">${word}</span>`)
                    .join('<span class="arrow">➔</span>');

                // 最新の1文字を丸の中に表示
                const lastChar = data.word.slice(-1);
                currentCircle.textContent = lastChar;
            }
        }

    </script>
</body>

</html>
