<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- headタグの中にはメタデータ等を記載する -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<h1>ゲームオーバー</h1>
<p id="reason"></p>
<button id="resetButton">最初からやり直す</button>

<script>
    // URLのパラメータからエラーメッセージを表示する
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    if (msg) {
        const reasonTag = document.querySelector("#reason");
        if (reasonTag) reasonTag.textContent = msg;
    }

    //リセットボタンが押された時
    document.querySelector("#resetButton").onclick = async () => {
        // サーバーにリセットを要求
        const response = await fetch("/reset", { method: "POST" });

        if (response.ok) {
            // サーバー側のリセットが成功したら、メイン画面に戻る
            window.location.href = "index.html";
        } else {
            alert("リセットに失敗しました");
        }
    };
</script>





</html>
